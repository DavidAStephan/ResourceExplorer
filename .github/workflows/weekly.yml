## Weekly nowcast pipeline.
##
## Schedule: Tue 09:00 AEST (UTC+10). Drifts to 10:00 local during AEDT
## (UTC+11) -- acceptable for a weekly cadence, fix if it ever matters.
##
## State (warehouse + cache + report archive) persists on the `data`
## branch, which this job force-pushes at the end of each successful run.
## The current week's briefing is also deployed to GitHub Pages.

name: weekly-nowcast

"on":
  schedule:
    - cron: "0 23 * * 1"     # Tuesday 23:00 UTC = 09:00 AEST
  workflow_dispatch:

# One run at a time. Don't cancel the in-flight one if a manual dispatch
# arrives mid-cron -- we'd rather it finish + write state than abort.
concurrency:
  group: weekly-nowcast
  cancel-in-progress: false

permissions:
  contents: write     # push to the `data` branch
  pages: write        # deploy the briefing to Pages
  id-token: write     # required by actions/deploy-pages@v4
  issues: write       # open/close the failure-notification issue

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Surface the deployed Pages URL on the run summary.
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true   # Posit Package Manager binaries

      - name: Restore R packages from renv.lock
        uses: r-lib/actions/setup-renv@v2

      - name: Restore pipeline state from `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Clone the data branch into a side directory. If it doesn't exist
          # yet (first run after delete), create an empty layout so the rest
          # of the workflow can write to it.
          AUTH_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --exit-code --heads "$AUTH_URL" data > /dev/null; then
            git clone --depth=1 --branch=data --single-branch "$AUTH_URL" ./_state
          else
            echo "::warning::data branch missing on remote -- creating empty state"
            mkdir -p ./_state
            (cd ./_state && git init -b data && git remote add origin "$AUTH_URL")
          fi
          mkdir -p data/warehouse data/cache
          # Materialise any prior state into the workspace. The repo's
          # main-branch .gitignore covers data/, so this never affects
          # `git status` on main.
          if [ -d ./_state/data ]; then
            cp -R ./_state/data/. ./data/
          fi
          ls -la data/warehouse/ data/cache/ || true

      - name: Run pipeline (--ci fails on all-stale ingest)
        run: Rscript run.R --ci

      - name: Build Pages site
        id: site
        env:
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%Y-%m-%d)
          SITE=./_state/site
          mkdir -p "$SITE/history" "$SITE/data"

          # This week's briefing lives at /history/YYYY-MM-DD.html and is
          # mirrored as /latest.html for a stable bookmark.
          cp reports/briefing/briefing.html "$SITE/history/${TODAY}.html"
          cp reports/briefing/briefing.html "$SITE/latest.html"

          # CSV outputs alongside, for any reader who wants the raw series.
          cp outputs/*.csv "$SITE/data/"

          # Shared stylesheet powers both the index and (via self-contained
          # embedding) the briefing.
          cp reports/briefing/style.css "$SITE/style.css"

          # Generate the index from a single Rscript template that reads
          # the live nowcast CSV so the headline numbers on the landing
          # page match the briefing. Pass the nowcast-history rds so the
          # landing page can also render the WoW delta and per-date
          # archive values.
          Rscript scripts/build_index.R \
            --site "$SITE" \
            --today "$TODAY" \
            --repo "$GH_REPO" \
            --history data/warehouse/mart_nowcast_history.rds

          echo "site_dir=$SITE" >> "$GITHUB_OUTPUT"

      # Persist state BEFORE deploying Pages. If the deploy step fails
      # (e.g. Pages not enabled, transient API hiccup), we still want
      # the warehouse + cache from this run committed to the data
      # branch -- otherwise a deploy failure also forfeits the
      # nowcast history row this run produced.
      - name: Persist state back to `data` branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          rm -rf ./_state/data
          mkdir -p ./_state/data
          cp -R ./data/. ./_state/data/

          cd ./_state
          git config user.name  "resourcetracker-bot"
          git config user.email "resourcetracker-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "state: weekly run $(date -u +%F)"
            git push --force origin HEAD:data
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.site.outputs.site_dir }}

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5

      # Graduated staleness signal -- run.R writes outputs/staleness.json
      # listing days-since-last-fresh-fetch per external source. The
      # pipeline itself doesn't fail when one source is stale (only --ci's
      # all-stale check does). Surface anything >7 days as a soft issue
      # so the freshness of the data is auditable; close the issue when
      # everything's fresh again.
      - name: Manage stale-source issue
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const fs   = require("fs");
            const path = "outputs/staleness.json";
            if (!fs.existsSync(path)) {
              core.info("no staleness.json produced; skipping");
              return;
            }
            const data = JSON.parse(fs.readFileSync(path, "utf8"));
            const stale = data.sources.filter(s => s.stale);
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "weekly-stale-source",
            });
            if (stale.length > 0) {
              const lines = stale.map(s => `- \`${s.source}\` last fresh fetch ${s.days_since_ok} days ago (${s.latest_ok})`);
              const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                `One or more external data sources have been silently stale for more than ${data.threshold_days} days.`,
                ``,
                `The pipeline is still publishing nowcasts off the stale-cache fallback, but the headline numbers reflect old upstream data. Investigate whether the source API is genuinely down or whether the URL/schema changed.`,
                ``,
                ...lines,
                ``,
                `Latest run: ${runUrl}`,
                ``,
                `This issue auto-closes when all sources are fresh again.`,
              ].join("\n");
              if (open.data.length > 0) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: open.data[0].number, body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner, repo: context.repo.repo,
                  title: "[weekly-nowcast] one or more sources are stale",
                  body, labels: ["weekly-stale-source"],
                });
              }
            } else {
              for (const issue of open.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number,
                  body: `All sources fresh on run ${context.runId}. Auto-closing.`,
                });
                await github.rest.issues.update({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: issue.number, state: "closed",
                });
              }
            }

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nowcast-logs-${{ github.run_id }}
          path: logs/
          retention-days: 30
          if-no-files-found: ignore

  notify-on-failure:
    needs: run-pipeline
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: read     # download the log artifact uploaded by run-pipeline
    steps:
      - name: Download log artifact from run-pipeline
        uses: actions/download-artifact@v5
        with:
          name: nowcast-logs-${{ github.run_id }}
          path: ./_logs
        continue-on-error: true   # still open an issue even if logs missing

      - name: Tail the most recent log file
        id: tail
        run: |
          set -euo pipefail
          LOG_FILE=$(ls -t ./_logs/*.log 2>/dev/null | head -1 || true)
          if [ -n "${LOG_FILE}" ] && [ -f "${LOG_FILE}" ]; then
            # Last 30 lines, escaped via base64 to survive the YAML/JS hop.
            tail -n 30 "${LOG_FILE}" | base64 > ./_logs/tail.b64
            {
              echo "tail_b64<<EOF"
              cat ./_logs/tail.b64
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "log_file=$(basename "${LOG_FILE}")" >> "$GITHUB_OUTPUT"
          else
            echo "tail_b64=" >> "$GITHUB_OUTPUT"
            echo "log_file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update failure issue
        uses: actions/github-script@v9
        env:
          LOG_TAIL_B64: ${{ steps.tail.outputs.tail_b64 }}
          LOG_FILE:     ${{ steps.tail.outputs.log_file }}
        with:
          script: |
            const title  = "[weekly-nowcast] run failed";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let logBlock = "";
            const tailB64 = process.env.LOG_TAIL_B64 || "";
            const logFile = process.env.LOG_FILE     || "";
            if (tailB64) {
              const tail = Buffer.from(tailB64, "base64").toString("utf8").trim();
              logBlock = [
                "",
                `**Last 30 lines of \`${logFile}\`:**`,
                "```",
                tail,
                "```",
              ].join("\n");
            }
            const body = [
              `Weekly pipeline failed at ${new Date().toISOString()}.`,
              ``,
              `Failed run: ${runUrl}`,
              logBlock,
              ``,
              `If this is a transient IMF PortWatch or DISR issue, re-run via`,
              `the Actions tab (workflow_dispatch). If it persists, inspect`,
              `the most recent commit on the \`data\` branch and the full log`,
              `artifact attached to the failing run.`,
              ``,
              `This issue auto-closes on the next successful run.`,
            ].join("\n");
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "weekly-failure",
            });
            if (open.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title, body, labels: ["weekly-failure"],
              });
            }

  close-failure-issue:
    needs: run-pipeline
    if: success()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Close any open failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: "open", labels: "weekly-failure",
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved by successful run ${context.runId}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: issue.number, state: "closed",
              });
            }
